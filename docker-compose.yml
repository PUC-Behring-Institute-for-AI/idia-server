# IDIA Server — Docker Compose orchestration
#
# Three service groups:
#   1. ray-head     (Ray Serve LLM + vLLM inference)
#   2. litellm      (API gateway — auth, routing, spend tracking)
#   3. prometheus + grafana (monitoring — see   for details)
#
# Port 4000 is the ONLY port exposed to external network access. Port 3000
# (Grafana) is accessible only from localhost (127.0.0.1). Ray ingress (8000),
# dashboard (8265), client port (10001), and Prometheus (9090) stay on the
# internal Compose network — they are NEVER published.
#
# See docs/ARCHITECTURE.md 5.4 for architecture rationale and 9 for
# the security constraints that justify this port isolation.

services:
  ray-head:
    build:
      context: .
      dockerfile: Dockerfile.ray
    ipc: host
    shm_size: "${RAY_SHM_SIZE:-4gb}"
    volumes:
      - idia_hf_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      # Single-model (backward compatible)
      - MODEL_ID=${MODEL_ID}
      - MODEL_SOURCE=${MODEL_SOURCE}
      # Multi-model: set MODELS_COUNT=N and MODEL_1_ID..MODEL_N_SOURCE
      # See docs/ARCHITECTURE.md §5.3 for details
      - MODELS_COUNT=${MODELS_COUNT:-}
      - MODEL_1_ID=${MODEL_1_ID:-}
      - MODEL_1_SOURCE=${MODEL_1_SOURCE:-}
      - MODEL_2_ID=${MODEL_2_ID:-}
      - MODEL_2_SOURCE=${MODEL_2_SOURCE:-}
      - MODEL_3_ID=${MODEL_3_ID:-}
      - MODEL_3_SOURCE=${MODEL_3_SOURCE:-}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-8192}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.9}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: "${RAY_MEMORY_LIMIT:-16g}"
        reservations:
          memory: "${RAY_MEMORY_RESERVATION:-8g}"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # NO ports: published — 8000 (Ray ingress), 8265 (dashboard), 10001
    # (client) stay on the internal Compose network. See ARCHITECTURE.md §9.3.

  litellm:
    image: docker.litellm.ai/berriai/litellm:v1.85.0
    depends_on:
      ray-head:
        condition: service_healthy
    ports:
      - "4000:4000"                  # Only port exposed to host
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["--config=/app/config.yaml"]
    restart: unless-stopped

  # ── Monitoring ────────────────────────────────────────────────────────
  # Prometheus scrapes metrics from the internal Compose network.
  # Port 9090 is NOT published — access the UI via docker compose exec.
  # See docs/ARCHITECTURE.md   for details.

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=5GB'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: "1g"               # prevent unbounded /prometheus growth
    restart: unless-stopped
    # NO ports: published — 9090 is internal. Grafana queries it via the
    # internal Compose network. For CLI access: docker compose exec prometheus sh

  # Grafana provides dashboards and alerting UI.
  # Bound to 127.0.0.1:3000 — accessible only from the host machine.

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"       # localhost only — no external access
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    restart: unless-stopped

volumes:
  prometheus_data:
    name: idia_prometheus_data
  grafana_data:
    name: idia_grafana_data
  idia_hf_cache:
    name: idia_hf_cache
