# Ray Serve LLM configuration — placeholders rendered at runtime by
# scripts/render_config.py.
#
# Proxy binds inside the container only (:8000). The port is NEVER
# published to the host — see docs/ARCHITECTURE.md §9.3.
#
# Single-model mode: set MODEL_ID + MODEL_SOURCE (backward compatible).
# Multi-model mode: set MODELS_COUNT=N and MODEL_1_ID .. MODEL_N_SOURCE.
#   Each model gets its own deployment with autoscaling.

proxy_location: EveryNode
http_options:
  host: 0.0.0.0
  port: 8000

applications:
  - name: llms
    import_path: ray.serve.llm:build_openai_app
    route_prefix: "/"
    args:
      llm_configs: ##LLM_CONFIGS##
        - model_loading_config:
            model_id: ${MODEL_ID}
            model_source: ${MODEL_SOURCE}
          engine_kwargs:
            dtype: bfloat16
            gpu_memory_utilization: ${GPU_MEMORY_UTILIZATION}
            max_model_len: ${MAX_MODEL_LEN}
          deployment_config:
            autoscaling_config:
              min_replicas: 0
              max_replicas: 4
              target_ongoing_requests: 64
