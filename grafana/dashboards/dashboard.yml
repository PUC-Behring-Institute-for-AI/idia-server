apiVersion: 1

providers:
  - name: "IDIA Server Dashboards"
    orgId: 1
    folder: "IDIA Server"
    type: file
    disableDeletion: false
    editable: false
    options:
      # Point to the provisioning mount path, not the Grafana data directory.
      # docker-compose.yml mounts ./grafana/dashboards/ → /etc/grafana/provisioning/dashboards
      # See docs/ARCHITECTURE.md §10.2 for details.
      path: /etc/grafana/provisioning/dashboards
