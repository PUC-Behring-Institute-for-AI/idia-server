# IDIA Server — Ray Cluster Launcher Configuration
#
# Deploys the IDIA Server on AWS with automatic GPU elasticity.
# This is the main deployment target for production use (§7.3).
#
# Usage:
#   1. Pre-render the config:  python3 scripts/render_config.py --dry-run > rendered_config.yaml
#   2. Launch cluster:         ray up -y cluster.yaml
#   3. Deploy LLM app:         ray exec cluster.yaml "serve run /app/rendered_config.yaml"
#   4. Dashboard tunnel:       ray dashboard cluster.yaml
#
# For automation:  ./scripts/deploy_cluster.sh
#
# References:
#   - ARCHITECTURE.md §7.3 — Ray Cluster Launcher
#   - ARCHITECTURE.md §9.2 — Security: dashboard isolation
#   - ARCHITECTURE.md §14.2 — Instance selection rationale
#
# Decision record:
#   - Pre-render workflow (decision 2026-06-28): serve_config.yaml has ${VAR}
#     placeholders since Phase 2. The Cluster Launcher file_mounts mechanism
#     copies static files only, so we pre-render locally before ray up.
#   - g5.xlarge chosen: 1× A10G 24GB, $0.80/hr on-demand. Adequate for 7-8B
#     models with FP8/INT4 quantization. See §14.2 for cost analysis.
#   - No worker_start_ray_commands: Ray's autoscaler handles worker startup
#     automatically in Docker mode via the bootstrap config generated by ray up.

cluster_name: inference-cluster
min_workers: 0
max_workers: 4
idle_timeout_minutes: 5

provider:
  type: aws
  region: us-east-1

docker:
  image: "rayproject/ray:2.56.0-py311-gpu@sha256:9e0af0a2820745fc567bfb3777f7fd38107a9ce72635c5861e473c24ea4dd150"
  container_name: "ray_container"
  run_options:
    - "--env HF_TOKEN=${HF_TOKEN}"

available_node_types:
  head_node:
    # CPU-only — runs Ray's control plane (GCS, dashboard, autoscaler).
    # Never holds model weights — a GPU here would be wasted (§7.3).
    node_config:
      InstanceType: m5.large
      # Security group created by scripts/create_security_groups.sh.
      # Set SG_ID env var before running deploy_cluster.sh, or the default
      # VPC security group is used (less restrictive).
      SecurityGroupIds:
        - "${SG_ID:-default}"
    resources:
      CPU: 2

  gpu_worker:
    # GPU node — runs the vLLM inference replicas.
    # Scales from zero when the replica autoscaler needs more capacity.
    # g5.xlarge: 1× A10G 24GB — adequate for 7-8B models (§14.2).
    # For larger models, change InstanceType to g6.12xlarge (4× L4).
    min_workers: 0
    max_workers: 4
    node_config:
      InstanceType: g5.xlarge
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 100        # GB — model weights + HuggingFace cache
            VolumeType: gp3
      SecurityGroupIds:
        - "${SG_ID:-default}"
    resources: {}                   # Ray auto-detects the NVIDIA GPU

head_node_type: head_node

# Files uploaded to ALL nodes before Ray starts.
# Pre-render with:  python3 scripts/render_config.py --dry-run > rendered_config.yaml
file_mounts:
  "/app/rendered_config.yaml": "./rendered_config.yaml"

# Commands run on the head node inside the Docker container.
head_setup_commands:
  - pip install --quiet "ray[serve,llm]==2.56.0"

# (Optional) Pre-sync model weights from S3 to reduce GPU worker cold start
# from ~15 minutes (HuggingFace download) to ~2 minutes (S3 transfer).
# To enable:
#   1. Run:  ./idia cache              # downloads + uploads to s3://idia-models-cache-<account>
#   2. Uncomment the lines below and set S3_BUCKET:
#
# worker_setup_commands:
#   - aws s3 sync s3://<your-bucket>/hf-cache/ /root/.cache/huggingface/ --quiet
#
# head_setup_commands should also include the sync for the head node render step:
#   - aws s3 sync s3://<your-bucket>/hf-cache/ /root/.cache/huggingface/ --quiet
#   - pip install --quiet "ray[serve,llm]==2.56.0"

# Commands to start Ray on the head node.
# --dashboard-host=127.0.0.1 is MANDATORY for security (§9.2).
# Without this flag, the dashboard binds to 0.0.0.0 by default, exposing
# the unauthenticated Jobs API to the network — actively exploited in the
# ShadowRay campaigns (CVE-2023-48022, CVE-2026-27482).
head_start_ray_commands:
  - ray stop
  - ray start --head --port=6379 --dashboard-host=127.0.0.1 --autoscaling-config=~/ray_bootstrap_config.yaml

# Worker nodes are started automatically by the Ray autoscaler in Docker mode.
# No explicit worker_start_ray_commands needed — the bootstrap config from
#  ray up handles worker node setup.
