# IDIA Server — LiteLLM proxy configuration
#
# Routes requests for one or more models to the Ray Serve LLM ingress at
# http://ray-head:8000/v1. The master key authenticates administrative
# endpoints (key generation, spend queries). Virtual keys scoped to
# individual users/teams are created at runtime via /key/generate.
#
# Single-model mode: uses MODEL_ID / MODEL_SOURCE from .env
# Multi-model mode: set MODELS_COUNT=N and MODEL_N_ID variables
#
# See docs/ARCHITECTURE.md §4.3 for the configuration anatomy and §8 for
# the client consumption pattern.
#
# Multi-model expansion: the render_config.py script expands the model_list
# from MODELS_COUNT env var at startup time. This entry provides routing
# for the first model; additional entries are generated dynamically.
#
# For a completely static multi-model setup, add entries manually below.

model_list:
  - model_name: ${MODEL_ID:-llama-3.1-8b}
    litellm_params:
      model: openai/${MODEL_ID:-llama-3.1-8b}
      api_base: http://ray-head:8000/v1
      api_key: "no-auth-internal"
    # Ray Serve ingress (:8000) is internal-only — no API key required.
    # This value is informational; see docs/ARCHITECTURE.md §9.3 for
    # the security model.

general_settings:
  master_key: ${LITELLM_MASTER_KEY}  # No fallback — required env var. See .env.example.
  max_parallel_requests: 20          # Cap global de requests simultâneos (STRUCT-09)

# Rate limiting por tier de usuário (hard / regular / light).
# Aplicado via default_team_settings — virtual keys herdam o team.
# Para override por chave: POST /key/generate com team_id explícito.
litellm_settings:
  default_team_settings:
    - team_alias: hard
      rpm_limit: 15                  # ~200 req/dia com peak factor
      tpm_limit: 50000
    - team_alias: regular
      rpm_limit: 4                   # ~50 req/dia
      tpm_limit: 15000
    - team_alias: light
      rpm_limit: 1                   # ~5 req/dia
      tpm_limit: 5000
