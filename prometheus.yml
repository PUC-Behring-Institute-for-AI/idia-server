# IDIA Server — Prometheus Configuration
# Scrapes metrics from Ray Serve (port 8080) and LiteLLM (port 4000).
#
# vLLM metrics are exposed through the same Ray Serve endpoint (port 8080)
# via Ray's built-in Prometheus integration — no separate scrape target needed.
#
# Alerts: configured in Grafana (native alerting UI), not via Alertmanager.
# See ARCHITECTURE.md 0.3 for recommended alert rules.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ray-serve
    static_configs:
      - targets:
          - "ray-head:8080"      # Ray metrics export port — distinct from
                                 # dashboard (8265) and ingress (8000)
        labels:
          layer: orchestration

  - job_name: litellm
    static_configs:
      - targets:
          - "litellm:4000"       # LiteLLM metrics (/metrics) on the same
                                 # port as the API — Prometheus auto-discovers
                                 # the /metrics path
        labels:
          layer: gateway

  - job_name: dcgm
    static_configs:
      - targets:
          - "dcgm-exporter:9400"
        labels:
          layer: gpu
